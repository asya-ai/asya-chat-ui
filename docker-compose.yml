services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    env_file:
      - .env
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    labels:
      - autoheal=true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s


  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      - PROJECT_ROOT_DIR=${PWD}
      - EXEC_HOST_FILES_DIR=${PWD}/data/files
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/files:/data/files
    depends_on:
      postgres:
        condition: service_healthy
      scraper:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 5s
      timeout: 5s
      retries: 12

  scraper:
    build:
      context: ./scraper
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/healthz').then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "8085:80"
    depends_on:
      backend:
        condition: service_healthy

  executor:
    build:
      context: ./backend/executor
    image: chatui-python-exec:latest
    profiles:
      - exec
